<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Original Watch DZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a; --dark: #111; --card: #161616;
      --border: #222; --gold: #c9a84c; --white: #f0ede8;
      --muted: #666; --red: #e05555; --green: #6dbf7a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* LOGIN */
    .login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(201,168,76,0.06) 0%, transparent 70%);
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 48px;
      width: 360px;
    }
    .login-logo {
      text-align: center;
      font-size: 2.5rem;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .login-title {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 36px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 12px 14px;
      background: var(--dark); border: 1px solid var(--border);
      color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--gold);
    }
    .form-group select option { background: var(--dark); }
    .btn-gold {
      width: 100%; padding: 13px;
      background: var(--gold); color: var(--black);
      border: none; font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }
    .btn-gold:hover { background: #e8c97a; }
    .login-error {
      color: var(--red); font-size: 0.8rem;
      text-align: center; margin-bottom: 16px;
      display: none;
    }

    /* DASHBOARD */
    .dashboard { display: none; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 220px; background: var(--dark);
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .sidebar-logo {
      font-size: 0.65rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--gold);
      padding: 0 12px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .nav-item {
      padding: 10px 12px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--muted);
      transition: all 0.15s;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-item:hover { color: var(--white); background: var(--card); }
    .nav-item.active { color: var(--gold); background: rgba(201,168,76,0.08); }
    .logout-btn {
      margin-top: auto;
      padding: 10px 12px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      border: 1px solid var(--border);
      text-align: center;
      transition: all 0.2s;
    }
    .logout-btn:hover { color: var(--red); border-color: var(--red); }
    .main {
      margin-left: 220px;
      padding: 40px;
      min-height: 100vh;
    }
    .page { display: none; }
    .page.active { display: block; }
    .page-title {
      font-size: 1.5rem; font-weight: 300; margin-bottom: 32px;
      padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }

    /* STATS */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 40px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      padding: 24px;
    }
    .stat-label {
      font-size: 0.65rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
    }
    .stat-value { font-size: 2rem; font-weight: 300; color: var(--gold); }

    /* TABLE */
    .table-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .btn-small {
      padding: 9px 20px; background: var(--gold);
      color: var(--black); border: none;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; cursor: pointer; font-family: 'Inter', sans-serif;
    }
    .btn-small:hover { background: #e8c97a; }
    .btn-outline {
      padding: 7px 16px; background: transparent;
      border: 1px solid var(--border); color: var(--silver);
      font-size: 0.7rem; cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-danger {
      padding: 7px 16px; background: transparent;
      border: 1px solid transparent; color: var(--muted);
      font-size: 0.7rem; cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .btn-danger:hover { border-color: var(--red); color: var(--red); }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 12px 16px;
      font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 16px; font-size: 0.85rem;
      border-bottom: 1px solid var(--border); vertical-align: middle;
    }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .badge {
      display: inline-block; padding: 3px 10px;
      font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .badge-in { background: rgba(109,191,122,0.15); color: var(--green); }
    .badge-out { background: rgba(224,85,85,0.15); color: var(--red); }
    .stock-input {
      width: 70px; padding: 6px 10px;
      background: var(--dark); border: 1px solid var(--border);
      color: var(--white); font-size: 0.85rem; font-family: 'Inter', sans-serif;
      outline: none;
    }
    .stock-input:focus { border-color: var(--gold); }

    /* MODAL */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal-box {
      background: var(--dark); border: 1px solid var(--border);
      width: 480px; padding: 40px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-box h3 {
      font-size: 1.1rem; font-weight: 400; margin-bottom: 28px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .modal-actions {
      display: flex; gap: 12px; margin-top: 28px; justify-content: flex-end;
    }
    .toast {
      position: fixed; bottom: 32px; right: 32px; z-index: 200;
      background: var(--green); color: var(--black);
      padding: 14px 24px; font-size: 0.82rem; font-weight: 600;
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: var(--red); color: var(--white); }

    .search-input {
      padding: 9px 14px; background: var(--dark);
      border: 1px solid var(--border); color: var(--white);
      font-family: 'Inter', sans-serif; font-size: 0.85rem;
      outline: none; width: 220px;
    }
    .search-input:focus { border-color: var(--gold); }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">⊙</div>
    <div class="login-title">Original Watch DZ · Admin</div>
    <div class="login-error" id="loginError">Identifiants incorrects.</div>
    <div class="form-group">
      <label>Nom d'utilisateur</label>
      <input type="text" id="loginUser" placeholder="admin"/>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-gold" onclick="doLogin()">Se connecter</button>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div class="dashboard" id="dashboard">
  <div class="sidebar">
    <div class="sidebar-logo">⊙ OW Admin</div>
    <div class="nav-item active" onclick="showPage('products')">📦 Produits</div>
    <div class="nav-item" onclick="showPage('add')">➕ Ajouter</div>
    <div class="nav-item" onclick="showPage('stats')">📊 Stats</div>
    <div class="logout-btn" onclick="doLogout()">Déconnexion</div>
  </div>

  <div class="main">

    <!-- PRODUCTS PAGE -->
    <div class="page active" id="page-products">
      <div class="page-title">Gestion des produits</div>
      <div class="table-header">
        <input class="search-input" type="text" placeholder="Rechercher..." oninput="filterTable(this.value)"/>
        <button class="btn-small" onclick="showPage('add')">+ Nouveau produit</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Produit</th>
            <th>Marque</th>
            <th>Genre</th>
            <th>Prix (DA)</th>
            <th>Stock</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productsTableBody"></tbody>
      </table>
    </div>

    <!-- ADD PAGE -->
    <div class="page" id="page-add">
      <div class="page-title">Ajouter un produit</div>
      <div style="max-width:480px">
        <div class="form-row">
          <div class="form-group">
            <label>Marque</label>
            <input type="text" id="addBrand" placeholder="ex: Festina"/>
          </div>
          <div class="form-group">
            <label>Modèle / Nom</label>
            <input type="text" id="addName" placeholder="ex: Diver Sapphire"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Prix (DA)</label>
            <input type="number" id="addPrice" placeholder="28000"/>
          </div>
          <div class="form-group">
            <label>Stock</label>
            <input type="number" id="addStock" placeholder="1"/>
          </div>
        </div>
        <div class="form-group">
          <label>Genre</label>
          <select id="addGender">
            <option value="homme">Homme</option>
            <option value="femme">Femme</option>
            <option value="mixte">Mixte</option>
          </select>
        </div>
        <div class="form-group">
          <label>URL de l'image (optionnel)</label>
          <input type="text" id="addImage" placeholder="https://..."/>
        </div>
        <button class="btn-gold" onclick="addProduct()">Ajouter le produit</button>
      </div>
    </div>

    <!-- STATS PAGE -->
    <div class="page" id="page-stats">
      <div class="page-title">Vue d'ensemble</div>
      <div class="stats-grid" id="statsGrid"></div>
    </div>

  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal-box">
    <h3>Modifier le produit</h3>
    <input type="hidden" id="editId"/>
    <div class="form-row">
      <div class="form-group">
        <label>Marque</label>
        <input type="text" id="editBrand"/>
      </div>
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="editName"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Prix (DA)</label>
        <input type="number" id="editPrice"/>
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="number" id="editStock"/>
      </div>
    </div>
    <div class="form-group">
      <label>Genre</label>
      <select id="editGender">
        <option value="homme">Homme</option>
        <option value="femme">Femme</option>
        <option value="mixte">Mixte</option>
      </select>
    </div>
    <div class="form-group">
      <label>URL image</label>
      <input type="text" id="editImage"/>
    </div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeEditModal()">Annuler</button>
      <button class="btn-small" onclick="saveEdit()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let token = localStorage.getItem('ow_token');
let allProducts = [];

// ── AUTH ──
async function doLogin() {
  const username = document.getElementById('loginUser').value;
  const password = document.getElementById('loginPass').value;
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.token) {
      token = data.token;
      localStorage.setItem('ow_token', token);
      showDashboard();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } catch {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('ow_token');
  token = null;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

async function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  await loadAdminProducts();
  renderStats();
}

// ── AUTO-LOGIN IF TOKEN ──
if (token) showDashboard();

// ── PAGES ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event && event.target && event.target.classList.add('active');
  if (name === 'stats') renderStats();
}

// ── LOAD PRODUCTS ──
async function loadAdminProducts() {
  const res = await fetch('/api/products');
  allProducts = await res.json();
  renderTable(allProducts);
}

function renderTable(list) {
  document.getElementById('productsTableBody').innerHTML = list.map(p => `
    <tr id="row-${p.id}">
      <td>${p.name}</td>
      <td>${p.brand}</td>
      <td style="text-transform:capitalize">${p.gender}</td>
      <td>${Number(p.price).toLocaleString('fr-DZ')}</td>
      <td>
        <input class="stock-input" type="number" value="${p.stock}"
          onchange="quickUpdateStock(${p.id}, this.value)" min="0"/>
      </td>
      <td>
        <span class="badge ${p.stock > 0 ? 'badge-in' : 'badge-out'}">
          ${p.stock > 0 ? 'En stock' : 'Épuisé'}
        </span>
      </td>
      <td style="display:flex;gap:8px">
        <button class="btn-outline" onclick="openEdit(${p.id})">Modifier</button>
        <button class="btn-danger" onclick="deleteProduct(${p.id})">Supprimer</button>
      </td>
    </tr>
  `).join('');
}

function filterTable(q) {
  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(q.toLowerCase()) ||
    p.brand.toLowerCase().includes(q.toLowerCase())
  );
  renderTable(filtered);
}

// ── QUICK STOCK UPDATE ──
async function quickUpdateStock(id, value) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  await fetch(`/api/admin/products/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ ...p, stock: parseInt(value) })
  });
  p.stock = parseInt(value);
  showToast('Stock mis à jour');
}

// ── ADD PRODUCT ──
async function addProduct() {
  const brand = document.getElementById('addBrand').value.trim();
  const name  = document.getElementById('addName').value.trim();
  const price = document.getElementById('addPrice').value;
  const stock = document.getElementById('addStock').value;
  const gender = document.getElementById('addGender').value;
  const image_url = document.getElementById('addImage').value.trim();
  if (!brand || !name || !price) return showToast('Remplissez tous les champs', true);
  await fetch('/api/admin/products', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ brand, name, price: Number(price), stock: Number(stock), gender, image_url })
  });
  showToast('Produit ajouté !');
  document.getElementById('addBrand').value = '';
  document.getElementById('addName').value = '';
  document.getElementById('addPrice').value = '';
  document.getElementById('addStock').value = '';
  document.getElementById('addImage').value = '';
  await loadAdminProducts();
  showPage('products');
}

// ── EDIT ──
function openEdit(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('editId').value = p.id;
  document.getElementById('editBrand').value = p.brand;
  document.getElementById('editName').value = p.name;
  document.getElementById('editPrice').value = p.price;
  document.getElementById('editStock').value = p.stock;
  document.getElementById('editGender').value = p.gender;
  document.getElementById('editImage').value = p.image_url || '';
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
}
async function saveEdit() {
  const id = document.getElementById('editId').value;
  const body = {
    brand: document.getElementById('editBrand').value,
    name:  document.getElementById('editName').value,
    price: Number(document.getElementById('editPrice').value),
    stock: Number(document.getElementById('editStock').value),
    gender: document.getElementById('editGender').value,
    image_url: document.getElementById('editImage').value
  };
  await fetch(`/api/admin/products/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify(body)
  });
  closeEditModal();
  showToast('Produit mis à jour !');
  await loadAdminProducts();
}

// ── DELETE ──
async function deleteProduct(id) {
  if (!confirm('Supprimer ce produit ?')) return;
  await fetch(`/api/admin/products/${id}`, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  });
  showToast('Produit supprimé');
  await loadAdminProducts();
}

// ── STATS ──
function renderStats() {
  const total = allProducts.length;
  const inStock = allProducts.filter(p => p.stock > 0).length;
  const outStock = total - inStock;
  const avgPrice = total ? Math.round(allProducts.reduce((s,p) => s + Number(p.price), 0) / total) : 0;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total produits</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">En stock</div><div class="stat-value" style="color:var(--green)">${inStock}</div></div>
    <div class="stat-card"><div class="stat-label">Épuisés</div><div class="stat-value" style="color:var(--red)">${outStock}</div></div>
    <div class="stat-card"><div class="stat-label">Prix moyen</div><div class="stat-value">${avgPrice.toLocaleString('fr-DZ')} DA</div></div>
  `;
}

// ── TOAST ──
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
